version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: orbitviewer-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - AIS_API_KEY=${AIS_API_KEY}
      - OPENSKY_CLIENT_ID=${OPENSKY_CLIENT_ID}
      - OPENSKY_CLIENT_SECRET=${OPENSKY_CLIENT_SECRET}
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: orbitviewer-frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
